<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predict</title>
      <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
</head>
<body>
  <!-- Prediction -->

      <div class="prediction-card">
        <h2>Student Performance Prediction</h2>

        <form action="/predictdata" method="post" class="prediction-form">
          <div class="form-group">
            <label> Gender </label>

            <select name="gender" required>
              <option value="">Select Gender</option>

              <option value="male">Male</option>

              <option value="female">Female</option>
            </select>
          </div>

          <div class="form-group">
            <label> Race / Ethnicity </label>

            <select name="race_ethnicity" required>
              <option value="">Select Group</option>

              <option value="group A">Group A</option>

              <option value="group B">Group B</option>

              <option value="group C">Group C</option>

              <option value="group D">Group D</option>

              <option value="group E">Group E</option>
            </select>
          </div>

          <div class="form-group">
            <label> Parental Education </label>

            <select name="parental_level_of_education" required>
              <option value="">Select Education</option>

              <option value="some high school">Some High School</option>

              <option value="high school">High School</option>

              <option value="some college">Some College</option>

              <option value="associate's degree">Associate Degree</option>

              <option value="bachelor's degree">Bachelor Degree</option>

              <option value="master's degree">Master Degree</option>
            </select>
          </div>

          <div class="form-group">
            <label> Lunch </label>

            <select name="lunch" required>
              <option value="">Select Lunch</option>

              <option value="standard">Standard</option>

              <option value="free/reduced">Free / Reduced</option>
            </select>
          </div>

          <div class="form-group">
            <label> Test Preparation </label>

            <select name="test_preparation_course" required>
              <option value="">Select Course</option>

              <option value="none">None</option>

              <option value="completed">Completed</option>
            </select>
          </div>

          <div class="form-group">
            <label> Reading Score </label>

            <input
              type="number"
              name="reading_score"
              min="0"
              max="100"
              placeholder="0 - 100"
              required
            />
          </div>

          <div class="form-group">
            <label> Writing Score </label>

            <input
              type="number"
              name="writing_score"
              min="0"
              max="100"
              placeholder="0 - 100"
              required
            />
          </div>

          <button class="predict-btn">Predict Result</button>
        </form>

        {% if results %}

        <div class="result-box">
          Prediction Result:

          <strong> {{results}} </strong>
        </div>

        {% endif %}
      </div>
    </div>
    {% if results %}

    <div class="notification">
      <div class="notification-content">
        <span
          class="close-btn"
          onclick="this.parentElement.parentElement.style.display = 'none'"
        >
          ×
        </span>

        <h2>Prediction Completed</h2>

        <p>
          Predicted Maths Score:
          <strong>{{results}}</strong>
        </p>
      </div>
    </div>

    {% endif %}
</body>
</html>
